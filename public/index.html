<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Leadership Intensive — Portal</title>

<style>
  :root{
    --ink:#00243f; --ink-2:#0a3a5f; --paper:#f6f4ee; --card:#ffffff; --line:#e4dfd3;
    --gold:#e8a723; --gold-deep:#b47c0e; --go:#1f8a5b; --muted:#5d6b76; --danger:#b23b3b;
    --radius:14px; --shadow:0 1px 2px rgba(0,36,63,.06), 0 12px 32px rgba(0,36,63,.08);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1200px 500px at 80% -10%, rgba(232,167,35,.10), transparent 60%), var(--paper);
    color:var(--ink); line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace}
  .wrap{max-width:720px;margin:0 auto;padding:28px 20px 72px}
  .wrap.wide{max-width:940px}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px}
  .brand .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);font-weight:600}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:2px 0 0;letter-spacing:-.01em}
  .brand p{margin:4px 0 0;color:var(--muted);font-size:14px}
  .viewlink{background:none;border:none;color:var(--ink-2);font:inherit;font-size:13px;cursor:pointer;padding:6px 2px;border-bottom:1px dashed var(--line)}
  .viewlink:hover{color:var(--gold-deep)}
  /* day tabs */
  .daytabs{display:flex;gap:8px;margin:0 0 20px}
  .daytab{flex:1;text-align:center;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:#fffdf8;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
  .daytab .d{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:2px}
  .daytab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .daytab.active .d{color:#ffd98a}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 24px}
  .field{margin-bottom:20px}
  label.lab{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);margin-bottom:8px}
  label.lab .req{color:var(--gold-deep)}
  .hint{font-weight:400;text-transform:none;letter-spacing:normal;color:var(--muted);font-size:12px;margin-left:6px}
  input[type=text],input[type=url],textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font:inherit;font-size:15px;color:var(--ink);background:#fffdf8;transition:border-color .15s, box-shadow .15s;}
  input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,167,35,.18)}
  textarea{resize:vertical;min-height:64px}
  .countrow{display:flex;justify-content:space-between;margin-top:6px}
  .count{font-size:12px;color:var(--muted)}
  .members{display:flex;flex-direction:column;gap:10px}
  .mrow{display:grid;grid-template-columns:1.1fr 1.3fr auto auto;gap:8px;align-items:center;background:#fffdf8;border:1px solid var(--line);border-radius:11px;padding:9px 10px}
  .mrow input{background:#fff}
  .pmbox{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:0 4px}
  .pmbox input{width:17px;height:17px;accent-color:var(--gold-deep);cursor:pointer}
  .pmbox label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--gold-deep);cursor:pointer}
  .rm{border:none;background:none;color:var(--muted);font-size:18px;line-height:1;cursor:pointer;padding:2px 6px;border-radius:6px}
  .rm:hover{color:var(--danger);background:rgba(178,59,59,.08)}
  .addrow{margin-top:12px;display:flex;align-items:center;gap:12px}
  .addbtn{border:1px dashed var(--line);background:transparent;color:var(--ink-2);font:inherit;font-size:13px;font-weight:600;padding:9px 14px;border-radius:10px;cursor:pointer}
  .addbtn:hover:not(:disabled){border-color:var(--gold);color:var(--gold-deep)}
  .addbtn:disabled{opacity:.45;cursor:not-allowed}
  .addnote{font-size:12px;color:var(--muted)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:10px;font:inherit;font-weight:600;font-size:15px;cursor:pointer;padding:13px 20px;transition:transform .06s, filter .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--ink);color:#fff;width:100%;margin-top:6px}
  .btn-primary:hover{filter:brightness(1.12)}
  .btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--gold)}
  .btn-sm{padding:8px 13px;font-size:13px;border-radius:8px}
  .msg{font-size:13px;margin-top:12px;min-height:18px}
  .msg.err{color:var(--danger)} .msg.ok{color:var(--go)}
  .confirm{text-align:center;padding:12px 6px}
  .check{width:56px;height:56px;border-radius:50%;background:rgba(31,138,91,.12);color:var(--go);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px}
  .confirm h2{font-family:'Space Grotesk',sans-serif;margin:0 0 6px;font-size:22px}
  .confirm p{color:var(--muted);margin:0 0 20px}
  .confirm .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .gate{max-width:360px}
  .tabbar{display:flex;gap:8px;margin-bottom:18px}
  .tab{padding:8px 14px;border:1px solid var(--line);border-radius:9px;background:#fffdf8;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat{flex:1;min-width:110px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:600;line-height:1}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
  .toolbar .spacer{flex:1}
  .team{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:20px 22px;margin-bottom:16px}
  .team-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .team-tag{font-size:12px;letter-spacing:.08em;background:var(--ink);color:#fff;padding:4px 10px;border-radius:6px}
  .team-count{font-size:12px;color:var(--muted)}
  .idea{font-size:16px;font-style:italic;color:var(--ink-2);border-left:3px solid var(--gold);padding:2px 0 2px 14px;margin:6px 0 16px}
  .idea.none{color:var(--muted);font-style:normal;border-color:var(--line)}
  .roster{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .roster li{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:14px}
  .pm-badge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(232,167,35,.18);color:var(--gold-deep);padding:2px 7px;border-radius:5px}
  .roster a{color:var(--ink-2);font-size:13px;text-decoration:none;border-bottom:1px solid var(--line)}
  .roster a:hover{color:var(--gold-deep);border-color:var(--gold)}
  .noln{font-size:12px;color:var(--muted)}
  .doclink{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#fff;background:var(--ink);padding:6px 12px;border-radius:8px;text-decoration:none}
  .doclink:hover{filter:brightness(1.15)}
  .empty{text-align:center;color:var(--muted);padding:48px 20px}
  .empty h2{font-family:'Space Grotesk',sans-serif;color:var(--ink);margin:0 0 6px}
  .foot{margin-top:22px;font-size:12px;color:var(--muted);text-align:center}
  /* diagram builder */
  .dtoolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .dtoolbar .addbtn.active{border-color:var(--gold);color:var(--gold-deep);background:rgba(232,167,35,.08)}
  .dhint{font-size:12px;color:var(--muted)}
  .dcanvas{position:relative;border:1px solid var(--line);border-radius:12px;background:#fffdf8;height:340px;overflow:auto;touch-action:none}
  .dcanvas-view{height:220px;margin-top:10px}
  .dsvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
  .dline{stroke:var(--ink-2);stroke-width:2}
  .dline:hover{stroke:var(--danger)}
  .dbox{position:absolute;width:140px;min-height:54px;background:#fff;border:1.5px solid var(--ink);border-radius:10px;padding:6px 10px 8px;box-shadow:var(--shadow)}
  .dbox.readonly{cursor:default}
  .dbox.connecting{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,167,35,.25)}
  .dbox-handle{height:12px;margin:-2px -6px 4px;cursor:grab;color:var(--line);font-size:10px;letter-spacing:2px;text-align:center;border-radius:6px 6px 0 0}
  .dbox-handle:active{cursor:grabbing}
  .dbox-lbl{font-size:13px;font-weight:600;color:var(--ink);outline:none;word-break:break-word;min-height:16px}
  .dbox-lbl:empty:before{content:attr(data-ph);color:var(--muted);font-weight:400}
  .dbox-rm{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px;line-height:1;cursor:pointer;padding:0}
  .dbox-rm:hover{color:var(--danger);border-color:#e7cccc}
  @media (max-width:560px){
    .brand h1{font-size:21px}
    .mrow{grid-template-columns:1fr auto;gap:8px}
    .mrow input[type=url]{grid-column:1 / -1}
    .pmbox{grid-column:1 / 2}
    .daytab{padding:8px 6px;font-size:11px}
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<div id="app"></div>

<script>
const MAX_MEMBERS = 6;
const $ = (s, el=document) => el.querySelector(s);
const app = document.getElementById('app');
let view = 'day2';          // 'day1' | 'day2' | 'day3' | 'admin'  (defaults to today: Tuesday)
let unlocked = false;
let adminCode = '';
let adminTab = 'prompts';   // 'teams' | 'prompts' | 'diagrams'
let lastTeams = [];
let lastLogs = [];
let lastDiagrams = [];

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function header(sub){
  return `<header>
    <div class="brand">
      <div class="eyebrow">AI Leadership Intensive &middot; Berkeley Innovation Group</div>
      <h1>Course Portal</h1>
      <p>${sub}</p>
    </div>
    <button class="viewlink" id="switch">${view==='admin'?'&larr; Back':'Instructor view &rarr;'}</button>
  </header>`;
}
function dayTabs(){
  return `<div class="daytabs">
    <div class="daytab ${view==='day1'?'active':''}" id="tab-day1"><span class="d">Monday</span>Team Check-In</div>
    <div class="daytab ${view==='day2'?'active':''}" id="tab-day2"><span class="d">Tuesday</span>Prompt Log</div>
    <div class="daytab ${view==='day3'?'active':''}" id="tab-day3"><span class="d">Wednesday</span>Project Diagram</div>
  </div>`;
}
function wireDayTabs(){
  const a=$('#tab-day1'), b=$('#tab-day2'), c=$('#tab-day3');
  if(a) a.onclick=()=>{ view='day1'; render(); };
  if(b) b.onclick=()=>{ view='day2'; render(); };
  if(c) c.onclick=()=>{ view='day3'; render(); };
  $('#switch').onclick=()=>{ view='admin'; render(); };
}

/* ===================== DAY 1: TEAM CHECK-IN ===================== */
function memberRowHTML(){
  return `<div class="mrow">
      <input type="text" class="m-name" placeholder="Full name" autocomplete="off">
      <input type="url" class="m-ln" placeholder="LinkedIn URL (optional)" autocomplete="off">
      <span class="pmbox"><input type="checkbox" class="m-pm" id="pm-__ID__"><label for="pm-__ID__">PM</label></span>
      <button type="button" class="rm" title="Remove">&times;</button>
    </div>`;
}
function renderDay1(){
  app.className=''; app.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='wrap';
  wrap.innerHTML = header('One person per team: add your name, teammates, and your idea.') + dayTabs() + `
    <div class="card">
      <div class="field">
        <label class="lab" for="f-team">Team name <span class="req">*</span></label>
        <input type="text" id="f-team" placeholder="e.g. Studybuddy">
      </div>
      <div class="field">
        <label class="lab">Team members <span class="req">*</span><span class="hint">up to six &mdash; check one box for your first PM</span></label>
        <div class="members" id="members"></div>
        <div class="addrow"><button type="button" class="addbtn" id="addm">+ Add teammate</button><span class="addnote" id="addnote"></span></div>
      </div>
      <div class="field">
        <label class="lab" for="f-idea">Your idea, in one sentence <span class="req">*</span></label>
        <textarea id="f-idea" maxlength="240" placeholder="A study tool that turns lecture notes into a five-question quiz."></textarea>
        <div class="countrow"><span class="count" id="count">0 / 240</span><span class="count">one thing, done well</span></div>
      </div>
      <button class="btn btn-primary" id="submit">Check in our team</button>
      <div class="msg" id="msg"></div>
    </div>
    <div class="foot">Your entry is shared with the instructor for this program only.</div>`;
  app.appendChild(wrap);
  wireDayTabs();
  const members=$('#members'); let seq=0;
  function addRow(){
    if(members.children.length>=MAX_MEMBERS) return;
    const tmp=document.createElement('div'); tmp.innerHTML=memberRowHTML().replace(/__ID__/g,'r'+(seq++));
    const row=tmp.firstElementChild; members.appendChild(row);
    row.querySelector('.rm').onclick=()=>{ if(members.children.length>1){ row.remove(); sync(); } };
    row.querySelector('.m-pm').addEventListener('change',function(){ if(this.checked) members.querySelectorAll('.m-pm').forEach(cb=>{ if(cb!==this) cb.checked=false; }); });
    sync();
  }
  function sync(){ const n=members.children.length; members.querySelectorAll('.rm').forEach(b=>b.style.visibility=n>1?'visible':'hidden'); $('#addm').disabled=n>=MAX_MEMBERS; $('#addnote').textContent=n>=MAX_MEMBERS?'Maximum of six.':(n+' of '+MAX_MEMBERS); }
  addRow(); addRow(); addRow();
  $('#addm').onclick=addRow;
  const idea=$('#f-idea'), count=$('#count');
  idea.addEventListener('input',()=>count.textContent=idea.value.length+' / 240');
  $('#submit').onclick=submitDay1;
}
async function submitDay1(){
  const msg=$('#msg'); msg.className='msg';
  const teamName=$('#f-team').value.trim(); const idea=$('#f-idea').value.trim();
  const members=[];
  document.querySelectorAll('#members .mrow').forEach(row=>{
    const name=row.querySelector('.m-name').value.trim();
    const linkedin=row.querySelector('.m-ln').value.trim();
    const isPM=row.querySelector('.m-pm').checked;
    if(name) members.push({name,linkedin,isPM});
  });
  if(!teamName){ msg.classList.add('err'); msg.textContent='Please add a team name.'; return; }
  if(members.length===0){ msg.classList.add('err'); msg.textContent='Add at least one team member.'; return; }
  if(!idea){ msg.classList.add('err'); msg.textContent='Add your one-sentence idea.'; return; }
  const btn=$('#submit'); btn.disabled=true; btn.textContent='Checking in...';
  try{
    const r=await fetch('/api/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({teamName,members,idea})});
    if(!r.ok) throw new Error();
    confirmScreen(esc(teamName)+' is checked in.', members.length+' member(s) on the board.', renderDay1, 'Submit another team');
  }catch(e){ msg.classList.add('err'); msg.textContent='Something went wrong. Try once more.'; btn.disabled=false; btn.textContent='Check in our team'; }
}

/* ===================== DAY 2: PROMPT LOG ===================== */
async function renderDay2(){
  app.className=''; app.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='wrap';
  wrap.innerHTML = header('Log your 20-prompt session and your revised idea.') + dayTabs() + `
    <div class="card">
      <div class="field">
        <label class="lab" for="p-team">Team name <span class="req">*</span></label>
        <input type="text" id="p-team" list="teamlist" placeholder="Your team from Monday">
        <datalist id="teamlist"></datalist>
      </div>
      <div class="field">
        <label class="lab" for="p-doc">Google Doc link &mdash; your 20 prompts <span class="req">*</span></label>
        <input type="url" id="p-doc" placeholder="https://docs.google.com/document/d/...">
        <div class="countrow"><span class="count">Set sharing to &ldquo;Anyone with the link can view&rdquo; so the instructor can open it.</span></div>
      </div>
      <div class="field">
        <label class="lab" for="p-idea">Your revised idea, in one sentence <span class="req">*</span><span class="hint">how it changed after 20 prompts</span></label>
        <textarea id="p-idea" maxlength="240" placeholder="Now: a quiz tool that also flags which topics you got wrong most."></textarea>
        <div class="countrow"><span class="count" id="pcount">0 / 240</span><span class="count">one thing, done well</span></div>
      </div>
      <button class="btn btn-primary" id="psubmit">Submit my prompt log</button>
      <div class="msg" id="pmsg"></div>
    </div>
    <div class="foot">Shared with the instructor for review.</div>`;
  app.appendChild(wrap);
  wireDayTabs();
  // populate team datalist
  try{ const r=await fetch('/api/teamnames'); const d=await r.json(); $('#teamlist').innerHTML=(d.names||[]).map(n=>`<option value="${esc(n)}">`).join(''); }catch(e){}
  const idea=$('#p-idea'), pc=$('#pcount');
  idea.addEventListener('input',()=>pc.textContent=idea.value.length+' / 240');
  $('#psubmit').onclick=submitDay2;
}
async function submitDay2(){
  const msg=$('#pmsg'); msg.className='msg';
  const teamName=$('#p-team').value.trim();
  const docUrl=$('#p-doc').value.trim(); const idea=$('#p-idea').value.trim();
  if(!teamName){ msg.classList.add('err'); msg.textContent='Please add your team name.'; return; }
  if(!docUrl){ msg.classList.add('err'); msg.textContent='Paste your Google Doc link.'; return; }
  if(!idea){ msg.classList.add('err'); msg.textContent='Add your revised one-sentence idea.'; return; }
  const btn=$('#psubmit'); btn.disabled=true; btn.textContent='Submitting...';
  try{
    const r=await fetch('/api/prompt-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({teamName,idea,docUrl})});
    if(!r.ok) throw new Error();
    confirmScreen(esc(teamName)+' is in.', 'Your prompt log and revised idea are submitted.', renderDay2, 'Submit another');
  }catch(e){ msg.classList.add('err'); msg.textContent='Something went wrong. Try once more.'; btn.disabled=false; btn.textContent='Submit my prompt log'; }
}

/* ===================== DAY 3: PROJECT DIAGRAM ===================== */
const DBOX_W = 140, DBOX_H = 54, DCANVAS_H = 340, MAX_DBOXES = 10, MAX_DARROWS = 20;
let dBoxes = [], dArrows = [], dSeq = 0, dConnectMode = false, dConnectFirst = null;
let dUidSeq = 0;

function dClipPoint(cx, cy, tx, ty){
  const dx=tx-cx, dy=ty-cy;
  if(!dx && !dy) return {x:cx,y:cy};
  const halfW=DBOX_W/2, halfH=DBOX_H/2;
  const sx = dx!==0 ? halfW/Math.abs(dx) : Infinity;
  const sy = dy!==0 ? halfH/Math.abs(dy) : Infinity;
  const s = Math.min(sx, sy);
  return {x:cx+dx*s, y:cy+dy*s};
}

function dBuildSvgAndBoxes(container, boxes, arrows, opts){
  opts = opts || {};
  const uid = 'darrow'+(dUidSeq++);
  container.innerHTML = '';
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('class','dsvg');
  svg.innerHTML = `<defs><marker id="${uid}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0L10,5L0,10z" fill="var(--ink-2)"></path></marker></defs>`;
  container.appendChild(svg);

  function redrawArrows(){
    svg.querySelectorAll('.dline').forEach(el=>el.remove());
    arrows.forEach((a,i)=>{
      const from=boxes.find(b=>b.id===a.from), to=boxes.find(b=>b.id===a.to);
      if(!from || !to) return;
      const c1={x:from.x+DBOX_W/2,y:from.y+DBOX_H/2}, c2={x:to.x+DBOX_W/2,y:to.y+DBOX_H/2};
      const p1=dClipPoint(c1.x,c1.y,c2.x,c2.y), p2=dClipPoint(c2.x,c2.y,c1.x,c1.y);
      const line=document.createElementNS(svgNS,'line');
      line.setAttribute('class','dline');
      line.setAttribute('x1',p1.x); line.setAttribute('y1',p1.y);
      line.setAttribute('x2',p2.x); line.setAttribute('y2',p2.y);
      line.setAttribute('marker-end',`url(#${uid})`);
      if(opts.interactive){
        line.style.cursor='pointer'; line.style.pointerEvents='auto';
        line.addEventListener('click',()=>{ arrows.splice(i,1); redrawArrows(); });
      }
      svg.appendChild(line);
    });
  }

  boxes.forEach(box=>{
    const el=document.createElement('div');
    el.className='dbox'+(opts.interactive?'':' readonly')+(box.id===opts.connecting?' connecting':'');
    el.style.left=box.x+'px'; el.style.top=box.y+'px';
    el.dataset.id=box.id;
    el.innerHTML = (opts.interactive?`<div class="dbox-handle" title="Drag">&#8942;&#8942;&#8942;</div>`:'') +
      `<div class="dbox-lbl" ${opts.interactive?'contenteditable="true"':''} data-ph="Label">${esc(box.label)}</div>` +
      (opts.interactive?`<button type="button" class="dbox-rm" title="Remove">&times;</button>`:'');
    container.appendChild(el);
    if(!opts.interactive) return;

    const lbl=el.querySelector('.dbox-lbl');
    if(opts.connectMode) lbl.contentEditable='false';
    lbl.addEventListener('blur',()=>{ const t=lbl.textContent.trim().slice(0,40); box.label=t; lbl.textContent=t; });
    el.querySelector('.dbox-rm').onclick=()=>{ opts.onRemoveBox(box.id); };
    el.querySelector('.dbox-handle').addEventListener('pointerdown', e=>{
      e.preventDefault();
      const rect=container.getBoundingClientRect();
      const startX=e.clientX, startY=e.clientY, origX=box.x, origY=box.y;
      function move(ev){
        const dx=ev.clientX-startX, dy=ev.clientY-startY;
        box.x=Math.max(6, Math.min(rect.width-DBOX_W-6, origX+dx));
        box.y=Math.max(12, Math.min(DCANVAS_H-DBOX_H-6, origY+dy));
        el.style.left=box.x+'px'; el.style.top=box.y+'px';
        redrawArrows();
      }
      function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); }
      document.addEventListener('pointermove',move);
      document.addEventListener('pointerup',up);
    });
    el.addEventListener('click', e=>{
      if(!opts.connectMode) return;
      if(e.target.classList.contains('dbox-rm')) return;
      opts.onBoxClick(box.id);
    });
  });

  redrawArrows();
  return { redrawArrows };
}

async function renderDay3(){
  app.className=''; app.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='wrap';
  wrap.innerHTML = header('Sketch how your project fits together: boxes for parts, arrows for how they connect.') + dayTabs() + `
    <div class="card">
      <div class="field">
        <label class="lab" for="d-team">Team name <span class="req">*</span></label>
        <input type="text" id="d-team" list="dteamlist" placeholder="Your team from Monday">
        <datalist id="dteamlist"></datalist>
      </div>
      <div class="field">
        <label class="lab">Project diagram <span class="req">*</span><span class="hint">add a box for each part, then connect them with arrows</span></label>
        <div class="dtoolbar">
          <button type="button" class="addbtn" id="daddbox">+ Add box</button>
          <button type="button" class="addbtn" id="daddarrow">+ Connect boxes</button>
          <button type="button" class="addbtn" id="dclearbtn">Clear</button>
          <span class="dhint" id="dhint"></span>
        </div>
        <div class="dcanvas" id="dcanvas"></div>
      </div>
      <button class="btn btn-primary" id="dsubmit">Save my diagram</button>
      <div class="msg" id="dmsg"></div>
    </div>
    <div class="foot">Shared with the instructor for review.</div>`;
  app.appendChild(wrap);
  wireDayTabs();
  try{ const r=await fetch('/api/teamnames'); const d=await r.json(); $('#dteamlist').innerHTML=(d.names||[]).map(n=>`<option value="${esc(n)}">`).join(''); }catch(e){}

  const canvas=$('#dcanvas');
  function updateHint(){
    $('#dhint').textContent = dConnectMode ? 'Click one box, then another, to draw an arrow between them.' : (dBoxes.length===0 ? 'Start by adding a box for each part of your project.' : '');
  }
  function paint(){
    dBuildSvgAndBoxes(canvas, dBoxes, dArrows, {
      interactive:true, connectMode:dConnectMode, connecting:dConnectFirst,
      onRemoveBox:(id)=>{
        dBoxes=dBoxes.filter(b=>b.id!==id);
        dArrows=dArrows.filter(a=>a.from!==id&&a.to!==id);
        paint();
      },
      onBoxClick:(id)=>{
        if(!dConnectFirst){ dConnectFirst=id; paint(); return; }
        if(dConnectFirst===id){ dConnectFirst=null; paint(); return; }
        const exists=dArrows.some(a=>a.from===dConnectFirst&&a.to===id);
        if(!exists && dArrows.length<MAX_DARROWS) dArrows.push({from:dConnectFirst,to:id});
        dConnectFirst=null; dConnectMode=false;
        $('#daddarrow').classList.remove('active');
        updateHint(); paint();
      }
    });
  }
  $('#daddbox').onclick=()=>{
    if(dBoxes.length>=MAX_DBOXES) return;
    const id='b'+(dSeq++);
    const rect=canvas.getBoundingClientRect();
    const cols=Math.max(1, Math.floor((rect.width||480)/170));
    const col=dBoxes.length%cols, row=Math.floor(dBoxes.length/cols);
    const x=Math.min(20+col*170, Math.max(6,(rect.width||480)-DBOX_W-6));
    dBoxes.push({id,label:'',x,y:20+row*90});
    dConnectMode=false; dConnectFirst=null; $('#daddarrow').classList.remove('active');
    updateHint(); paint();
    const lbl=canvas.querySelector(`.dbox[data-id="${id}"] .dbox-lbl`);
    if(lbl) lbl.focus();
  };
  $('#daddarrow').onclick=()=>{
    if(dBoxes.length<2) return;
    dConnectMode=!dConnectMode; dConnectFirst=null;
    $('#daddarrow').classList.toggle('active', dConnectMode);
    updateHint(); paint();
  };
  $('#dclearbtn').onclick=()=>{
    if(dBoxes.length===0 && dArrows.length===0) return;
    if(!confirm('Clear the whole diagram?')) return;
    dBoxes=[]; dArrows=[]; dConnectMode=false; dConnectFirst=null;
    $('#daddarrow').classList.remove('active');
    updateHint(); paint();
  };
  dConnectMode=false; dConnectFirst=null;
  updateHint(); paint();
  $('#dsubmit').onclick=submitDiagram;
}

function dSyncLabelsFromDom(){
  document.querySelectorAll('#dcanvas .dbox').forEach(el=>{
    const id=el.dataset.id, box=dBoxes.find(b=>b.id===id), lbl=el.querySelector('.dbox-lbl');
    if(box && lbl) box.label = lbl.textContent.trim().slice(0,40);
  });
}
async function submitDiagram(){
  dSyncLabelsFromDom();
  const msg=$('#dmsg'); msg.className='msg';
  const teamName=$('#d-team').value.trim();
  if(!teamName){ msg.classList.add('err'); msg.textContent='Please add your team name.'; return; }
  if(dBoxes.length===0){ msg.classList.add('err'); msg.textContent='Add at least one box to your diagram.'; return; }
  if(dBoxes.some(b=>!b.label.trim())){ msg.classList.add('err'); msg.textContent='Every box needs a label.'; return; }
  const btn=$('#dsubmit'); btn.disabled=true; btn.textContent='Saving...';
  try{
    const r=await fetch('/api/diagram-submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({teamName,boxes:dBoxes,arrows:dArrows})});
    if(!r.ok) throw new Error();
    const savedBoxes=dBoxes.length, savedArrows=dArrows.length;
    dBoxes=[]; dArrows=[]; dSeq=0;
    confirmScreen(esc(teamName)+"'s diagram is saved.", savedBoxes+' box(es), '+savedArrows+' connection(s).', renderDay3, 'Edit another');
  }catch(e){ msg.classList.add('err'); msg.textContent='Something went wrong. Try once more.'; btn.disabled=false; btn.textContent='Save my diagram'; }
}

/* ===================== shared confirmation ===================== */
function confirmScreen(title, sub, againFn, againLabel){
  app.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='wrap';
  wrap.innerHTML = header('') + `
    <div class="card confirm">
      <div class="check">&check;</div>
      <h2>${title}</h2><p>${sub}</p>
      <div class="row"><button class="btn btn-ghost btn-sm" id="again">${againLabel}</button></div>
    </div>`;
  app.appendChild(wrap);
  $('#switch').onclick=()=>{ view='admin'; render(); };
  $('#again').onclick=againFn;
}

/* ===================== ADMIN ===================== */
function renderGate(){
  app.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='wrap';
  wrap.innerHTML = header('Instructor access.') + `
    <div class="card gate">
      <div class="field"><label class="lab" for="f-code">Instructor passcode</label>
      <input type="text" id="f-code" placeholder="enter passcode" autocomplete="off"></div>
      <button class="btn btn-primary" id="unlock">View submissions</button>
      <div class="msg" id="gmsg"></div>
    </div>`;
  app.appendChild(wrap);
  $('#switch').onclick=()=>{ view='day2'; render(); };
  const go=async()=>{
    const code=$('#f-code').value.trim(); const m=$('#gmsg'); m.className='msg';
    try{
      const r=await fetch('/api/prompt-roster?code='+encodeURIComponent(code));
      if(r.status===401){ m.classList.add('err'); m.textContent='That passcode did not match.'; return; }
      const d=await r.json(); adminCode=code; unlocked=true; lastLogs=d.logs||[];
      renderAdmin();
    }catch(e){ m.classList.add('err'); m.textContent='Could not reach the server.'; }
  };
  $('#unlock').onclick=go;
  $('#f-code').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
}

async function renderAdmin(){
  app.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='wrap wide';
  wrap.innerHTML = header('Live submissions.') + `
    <div class="tabbar">
      <div class="tab ${adminTab==='teams'?'active':''}" id="at-teams">Teams (Mon)</div>
      <div class="tab ${adminTab==='prompts'?'active':''}" id="at-prompts">Prompt logs (Tue)</div>
      <div class="tab ${adminTab==='diagrams'?'active':''}" id="at-diagrams">Diagrams (Wed)</div>
    </div>
    <div id="content"><div class="empty"><h2>Loading...</h2></div></div>`;
  app.appendChild(wrap);
  $('#switch').onclick=()=>{ view='day2'; render(); };
  $('#at-teams').onclick=()=>{ adminTab='teams'; renderAdmin(); };
  $('#at-prompts').onclick=()=>{ adminTab='prompts'; renderAdmin(); };
  $('#at-diagrams').onclick=()=>{ adminTab='diagrams'; renderAdmin(); };
  if(adminTab==='teams') await renderTeamsTab();
  else if(adminTab==='prompts') await renderPromptsTab();
  else await renderDiagramsTab();
}

async function renderTeamsTab(){
  try{ const r=await fetch('/api/roster?code='+encodeURIComponent(adminCode)); const d=await r.json(); lastTeams=d.teams||[]; }catch(e){ lastTeams=[]; }
  const teams=lastTeams; const content=$('#content');
  if(teams.length===0){ content.innerHTML=`<div class="empty"><h2>No team check-ins yet</h2><button class="btn btn-ghost btn-sm" id="refresh" style="margin-top:12px">Refresh</button></div>`; $('#refresh').onclick=renderAdmin; return; }
  const students=teams.reduce((s,t)=>s+(t.members?t.members.length:0),0);
  const pms=teams.reduce((s,t)=>s+(t.members?t.members.filter(m=>m.isPM).length:0),0);
  let html=`<div class="stats">
      <div class="stat"><div class="n">${teams.length}</div><div class="l">Teams</div></div>
      <div class="stat"><div class="n">${students}</div><div class="l">Students</div></div>
      <div class="stat"><div class="n">${pms}</div><div class="l">PMs named</div></div>
    </div>
    <div class="toolbar"><button class="btn btn-ghost btn-sm" id="refresh">&#8635; Refresh</button>
      <button class="btn btn-ghost btn-sm" id="csv">Export CSV</button><span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" id="clear" style="color:var(--danger);border-color:#e7cccc">Clear teams</button></div>`;
  for(const t of teams){
    const mem=t.members||[];
    html+=`<div class="team"><div class="team-head"><span class="team-tag mono">${esc(t.teamName)}</span><span class="team-count">${mem.length} member(s)</span></div>
      <div class="idea ${t.idea?'':'none'}">${t.idea?esc(t.idea):'No idea submitted'}</div>
      <ul class="roster">${mem.map(m=>`<li><span>${esc(m.name)}</span>${m.isPM?'<span class="pm-badge">First PM</span>':''}${m.linkedin?`<a href="${esc(m.linkedin)}" target="_blank" rel="noopener">LinkedIn &#8599;</a>`:'<span class="noln">no LinkedIn</span>'}</li>`).join('')}</ul></div>`;
  }
  content.innerHTML=html;
  $('#refresh').onclick=renderAdmin;
  $('#csv').onclick=()=>{ window.location='/api/export.csv?code='+encodeURIComponent(adminCode); };
  $('#clear').onclick=async()=>{ if(!confirm('Delete every team check-in?')) return; await fetch('/api/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:adminCode})}); renderAdmin(); };
}

async function renderPromptsTab(){
  try{ const r=await fetch('/api/prompt-roster?code='+encodeURIComponent(adminCode)); const d=await r.json(); lastLogs=d.logs||[]; }catch(e){ lastLogs=[]; }
  const logs=lastLogs; const content=$('#content');
  if(logs.length===0){ content.innerHTML=`<div class="empty"><h2>No prompt logs yet</h2><p>Submissions will appear here as students share their Google Doc links.</p><button class="btn btn-ghost btn-sm" id="refresh" style="margin-top:12px">Refresh</button></div>`; $('#refresh').onclick=renderAdmin; return; }
  const teamsCount=new Set(logs.map(l=>(l.teamName||'').toLowerCase())).size;
  // group by team
  const groups={};
  for(const l of logs){ const k=(l.teamName||'-').trim().toLowerCase(); (groups[k]=groups[k]||{label:l.teamName,items:[]}).items.push(l); }
  const keys=Object.keys(groups).sort((a,b)=>groups[a].label.localeCompare(groups[b].label));
  let html=`<div class="stats">
      <div class="stat"><div class="n">${logs.length}</div><div class="l">Submissions</div></div>
      <div class="stat"><div class="n">${teamsCount}</div><div class="l">Teams</div></div>
    </div>
    <div class="toolbar"><button class="btn btn-ghost btn-sm" id="refresh">&#8635; Refresh</button>
      <button class="btn btn-ghost btn-sm" id="csv">Export CSV</button><span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" id="clear" style="color:var(--danger);border-color:#e7cccc">Clear logs</button></div>`;
  for(const k of keys){
    const g=groups[k];
    html+=`<div class="team"><div class="team-head"><span class="team-tag mono">${esc(g.label)}</span><span class="team-count">${g.items.length} submission(s)</span></div>
      <ul class="roster">${g.items.map(l=>`<li>
          <span class="idea" style="margin:0;border:none;padding:0;font-size:14px">${esc(l.idea||'')}</span>
          ${l.docUrl?`<a class="doclink" href="${esc(l.docUrl)}" target="_blank" rel="noopener">Open prompts &#8599;</a>`:'<span class="noln">no link</span>'}
        </li>`).join('')}</ul></div>`;
  }
  content.innerHTML=html;
  $('#refresh').onclick=renderAdmin;
  $('#csv').onclick=()=>{ window.location='/api/prompt-export.csv?code='+encodeURIComponent(adminCode); };
  $('#clear').onclick=async()=>{ if(!confirm('Delete every prompt log?')) return; await fetch('/api/prompt-clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:adminCode})}); renderAdmin(); };
}

async function renderDiagramsTab(){
  try{ const r=await fetch('/api/diagram-roster?code='+encodeURIComponent(adminCode)); const d=await r.json(); lastDiagrams=d.diagrams||[]; }catch(e){ lastDiagrams=[]; }
  const diagrams=lastDiagrams; const content=$('#content');
  if(diagrams.length===0){ content.innerHTML=`<div class="empty"><h2>No diagrams yet</h2><p>Submissions will appear here as students save their project diagrams.</p><button class="btn btn-ghost btn-sm" id="refresh" style="margin-top:12px">Refresh</button></div>`; $('#refresh').onclick=renderAdmin; return; }
  let html=`<div class="stats">
      <div class="stat"><div class="n">${diagrams.length}</div><div class="l">Teams</div></div>
    </div>
    <div class="toolbar"><button class="btn btn-ghost btn-sm" id="refresh">&#8635; Refresh</button><span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" id="clear" style="color:var(--danger);border-color:#e7cccc">Clear diagrams</button></div>`;
  for(const dgm of diagrams){
    html+=`<div class="team"><div class="team-head"><span class="team-tag mono">${esc(dgm.teamName)}</span><span class="team-count">${(dgm.boxes||[]).length} box(es), ${(dgm.arrows||[]).length} connection(s)</span></div>
      <div class="dcanvas dcanvas-view" id="dview-${esc(dgm.key)}"></div></div>`;
  }
  content.innerHTML=html;
  for(const dgm of diagrams){
    const el=document.getElementById('dview-'+dgm.key);
    if(el) dBuildSvgAndBoxes(el, dgm.boxes||[], dgm.arrows||[], {interactive:false});
  }
  $('#refresh').onclick=renderAdmin;
  $('#clear').onclick=async()=>{ if(!confirm('Delete every diagram?')) return; await fetch('/api/diagram-clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:adminCode})}); renderAdmin(); };
}

/* ===================== router ===================== */
function render(){
  if(view==='admin'){ if(unlocked) renderAdmin(); else renderGate(); }
  else if(view==='day1') renderDay1();
  else if(view==='day3') renderDay3();
  else renderDay2();
}
render();
</script>
